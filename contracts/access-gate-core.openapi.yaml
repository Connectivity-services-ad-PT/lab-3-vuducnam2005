openapi: 3.0.3
info:
  title: Smart Campus - Core Business Access Policy API
  version: 1.0.0
  description: >
    Contract between Access Gate (consumer) and Core Business (provider).
    Pair 10 agreed that Access Gate calls Core Business in real time before
    opening a gate. The main SLA for POST /access/check is 500ms on the local
    service.
  contact:
    name: Pair 10 - Access Gate and Core Business
    email: fit4110@example.edu.vn
servers:
  - url: http://localhost:4010
    description: Prism mock server
  - url: http://localhost:8000
    description: Local development server
tags:
  - name: health
    description: Service health checks
  - name: access
    description: Real-time gate access decisions
  - name: policies
    description: Access policy lookup
  - name: decisions
    description: Access decision audit lookup
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: getHealth
      tags: [health]
      summary: Check Core Business health
      description: Public endpoint used by Access Gate and CI to detect service readiness.
      security: []
      responses:
        "200":
          description: Core Business is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                ok:
                  value:
                    status: ok
                    service: core-business
                    time: "2026-05-10T08:00:00Z"
  /access/check:
    post:
      operationId: checkAccessPolicy
      tags: [access]
      summary: Check whether a card may pass through a gate
      description: >
        Access Gate calls this endpoint on every card tap. Core Business returns
        ALLOW or DENY. The negotiated local SLA is 500ms.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessCheckRequest"
            examples:
              allowEntry:
                value:
                  cardId: RFID-2026-001
                  gateId: GATE-01
                  direction: IN
                  timestamp: "2026-05-10T08:00:00Z"
                  idempotencyKey: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babe
              exitCheck:
                value:
                  cardId: RFID-2026-042
                  gateId: GATE-03
                  direction: OUT
                  timestamp: "2026-05-10T17:30:00Z"
      responses:
        "200":
          description: Access decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessCheckResponse"
              examples:
                allowed:
                  value:
                    decisionId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babf
                    decision: ALLOW
                    reasonCode: NONE
                    policyId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2bac0
                    expiresAt: "2026-05-10T08:05:00Z"
                    checkedAt: "2026-05-10T08:00:00Z"
                denied:
                  value:
                    decisionId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2bac1
                    decision: DENY
                    reasonCode: CARD_EXPIRED
                    policyId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2bac0
                    checkedAt: "2026-05-10T08:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /policies/access:
    get:
      operationId: listAccessPolicies
      tags: [policies]
      summary: List access policies
      description: Access Gate uses cursor-based pagination to sync policy cache and audit data.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          required: false
          description: Filter policies by status.
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, ARCHIVED]
      responses:
        "200":
          description: Access policy page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyPage"
              examples:
                firstPage:
                  value:
                    items:
                      - policyId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2bac0
                        name: Office hours - Zone A
                        description: Policy for Zone A during office hours
                        status: ACTIVE
                        rules:
                          - ruleType: TIME_BASED
                            ruleId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2bac2
                            startTime: "07:00"
                            endTime: "22:00"
                            allowedDays: [MON, TUE, WED, THU, FRI]
                        createdAt: "2026-01-01T00:00:00Z"
                        updatedAt: "2026-05-01T00:00:00Z"
                    nextCursor: cursor-next-page
                    hasMore: false
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /policies/access/{policyId}:
    get:
      operationId: getAccessPolicyById
      tags: [policies]
      summary: Get one access policy
      description: Access Gate reads one policy by UUID to display or debug policy rules.
      parameters:
        - $ref: "#/components/parameters/PolicyId"
      responses:
        "200":
          description: Access policy detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessPolicy"
              examples:
                activePolicy:
                  value:
                    policyId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2bac0
                    name: Office hours - Zone A
                    description: Policy for Zone A during office hours
                    status: ACTIVE
                    rules:
                      - ruleType: TIME_BASED
                        ruleId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2bac2
                        startTime: "07:00"
                        endTime: "22:00"
                        allowedDays: [MON, TUE, WED, THU, FRI]
                      - ruleType: ROLE_BASED
                        ruleId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2bac3
                        allowedRoles: [STUDENT, LECTURER, STAFF]
                        restrictedZones: []
                    createdAt: "2026-01-01T00:00:00Z"
                    updatedAt: "2026-05-01T00:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /decisions:
    get:
      operationId: listDecisions
      tags: [decisions]
      summary: List access decisions
      description: Access Gate queries decision history with cursor-based pagination for audit.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Access decision page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionPage"
              examples:
                firstPage:
                  value:
                    items:
                      - decisionId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babf
                        cardId: RFID-2026-001
                        gateId: GATE-01
                        direction: IN
                        decision: ALLOW
                        reasonCode: NONE
                        policyId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2bac0
                        checkedAt: "2026-05-10T08:00:00Z"
                    nextCursor: cursor-next-page
                    hasMore: false
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /decisions/{decisionId}:
    get:
      operationId: getDecisionById
      tags: [decisions]
      summary: Get one access decision
      description: Read one decision by UUID for audit or incident investigation.
      parameters:
        - $ref: "#/components/parameters/DecisionId"
      responses:
        "200":
          description: Access decision detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessDecision"
              examples:
                allowDecision:
                  value:
                    decisionId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babf
                    cardId: RFID-2026-001
                    gateId: GATE-01
                    direction: IN
                    decision: ALLOW
                    reasonCode: NONE
                    policyId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2bac0
                    checkedAt: "2026-05-10T08:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PolicyId:
      name: policyId
      in: path
      required: true
      description: Access policy UUID.
      schema:
        type: string
        format: uuid
    DecisionId:
      name: decisionId
      in: path
      required: true
      description: Access decision UUID.
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      required: false
      description: Cursor for the next page.
      schema:
        type: string
        nullable: true
        minLength: 1
        maxLength: 200
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, service, time]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
          minLength: 2
          maxLength: 80
        time:
          type: string
          format: date-time
    AccessCheckRequest:
      type: object
      additionalProperties: false
      required: [cardId, gateId, direction, timestamp]
      properties:
        cardId:
          type: string
          pattern: "^RFID-[0-9]{4}-[0-9]{3}$"
        gateId:
          type: string
          pattern: "^GATE-[0-9]{2}$"
        direction:
          type: string
          enum: [IN, OUT]
        timestamp:
          type: string
          format: date-time
        idempotencyKey:
          type: string
          nullable: true
          format: uuid
    AccessCheckResponse:
      type: object
      additionalProperties: false
      required: [decisionId, decision, policyId, checkedAt]
      properties:
        decisionId:
          type: string
          format: uuid
        decision:
          type: string
          enum: [ALLOW, DENY]
        reasonCode:
          type: string
          nullable: true
          minLength: 2
          maxLength: 80
        policyId:
          type: string
          format: uuid
        expiresAt:
          type: string
          nullable: true
          format: date-time
        checkedAt:
          type: string
          format: date-time
    AccessPolicy:
      type: object
      additionalProperties: false
      required: [policyId, name, status, rules, createdAt, updatedAt]
      properties:
        policyId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 3
          maxLength: 120
        description:
          type: string
          nullable: true
          maxLength: 500
        status:
          type: string
          enum: [ACTIVE, INACTIVE, ARCHIVED]
        rules:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: "#/components/schemas/PolicyRule"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PolicyRule:
      oneOf:
        - $ref: "#/components/schemas/TimeBasedRule"
        - $ref: "#/components/schemas/RoleBasedRule"
      discriminator:
        propertyName: ruleType
        mapping:
          TIME_BASED: "#/components/schemas/TimeBasedRule"
          ROLE_BASED: "#/components/schemas/RoleBasedRule"
    TimeBasedRule:
      type: object
      additionalProperties: false
      required: [ruleType, ruleId, startTime, endTime, allowedDays]
      properties:
        ruleType:
          type: string
          enum: [TIME_BASED]
        ruleId:
          type: string
          format: uuid
        startTime:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
        endTime:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
        allowedDays:
          type: array
          minItems: 1
          maxItems: 7
          items:
            type: string
            enum: [MON, TUE, WED, THU, FRI, SAT, SUN]
    RoleBasedRule:
      type: object
      additionalProperties: false
      required: [ruleType, ruleId, allowedRoles]
      properties:
        ruleType:
          type: string
          enum: [ROLE_BASED]
        ruleId:
          type: string
          format: uuid
        allowedRoles:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: string
            minLength: 2
            maxLength: 50
        restrictedZones:
          type: array
          nullable: true
          maxItems: 50
          items:
            type: string
            minLength: 1
            maxLength: 50
    AccessDecision:
      type: object
      additionalProperties: false
      required: [decisionId, cardId, gateId, direction, decision, policyId, checkedAt]
      properties:
        decisionId:
          type: string
          format: uuid
        cardId:
          type: string
          pattern: "^RFID-[0-9]{4}-[0-9]{3}$"
        gateId:
          type: string
          pattern: "^GATE-[0-9]{2}$"
        direction:
          type: string
          enum: [IN, OUT]
        decision:
          type: string
          enum: [ALLOW, DENY]
        reasonCode:
          type: string
          nullable: true
          minLength: 2
          maxLength: 80
        policyId:
          type: string
          format: uuid
        expiresAt:
          type: string
          nullable: true
          format: date-time
        checkedAt:
          type: string
          format: date-time
    PolicyPage:
      type: object
      additionalProperties: false
      required: [items, nextCursor, hasMore]
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/AccessPolicy"
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
    DecisionPage:
      type: object
      additionalProperties: false
      required: [items, nextCursor, hasMore]
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/AccessDecision"
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
          minLength: 3
          maxLength: 120
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
          nullable: true
          maxLength: 500
        instance:
          type: string
          nullable: true
          format: uri
        errors:
          type: array
          maxItems: 50
          items:
            type: object
            additionalProperties: false
            required: [field, code, message]
            properties:
              field:
                type: string
                minLength: 1
                maxLength: 80
              code:
                type: string
                minLength: 2
                maxLength: 80
              message:
                type: string
                minLength: 3
                maxLength: 200
  responses:
    BadRequest:
      description: Invalid request payload or query parameter
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: https://campus.local/errors/validation
            title: Invalid request
            status: 400
            detail: Payload does not match the contract schema
            instance: https://api.campus.local/access/check
            errors:
              - field: cardId
                code: PATTERN_MISMATCH
                message: cardId must match RFID-YYYY-NNN
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: https://campus.local/errors/unauthorized
            title: Unauthorized
            status: 401
            detail: Missing or invalid bearer token
            instance: https://api.campus.local/access/check
            errors: []
    Forbidden:
      description: Authenticated caller is not allowed to perform the action
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Resource does not exist
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: https://campus.local/errors/not-found
            title: Not found
            status: 404
            detail: Policy was not found
            instance: https://api.campus.local/policies/access/0196fb3d-4ad7-7d1e-9f49-5d5148d2ffff
            errors: []
    Conflict:
      description: Business conflict or duplicated idempotency key
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    UnprocessableEntity:
      description: Valid JSON shape but invalid business state
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    InternalServerError:
      description: Unexpected server error
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
