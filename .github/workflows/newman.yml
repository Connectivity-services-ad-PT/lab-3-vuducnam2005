name: Contract and Newman Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Lint OpenAPI contracts
        run: npm run lint:contract

      - name: Start Core and Analytics Prism mock servers
        run: |
          nohup npm run mock:core > prism-core.log 2>&1 &
          nohup npm run mock:analytics > prism-analytics.log 2>&1 &

      - name: Wait for mock servers
        run: npx wait-on tcp:4010 tcp:4011 --timeout 30000

      - name: Run Newman contract tests
        run: npm run test:mock

      - name: Show Prism logs on failure
        if: failure()
        run: |
          cat prism-core.log || true
          cat prism-analytics.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-newman-reports
          path: reports/
